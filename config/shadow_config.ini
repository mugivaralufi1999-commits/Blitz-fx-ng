[ShadowSystem]
; Shadow System Configuration

; Shadow intensity (0.0 - 1.0)
ShadowIntensity=0.8

; Shadow softness (0.5 - 5.0)
ShadowSoftness=2.0

; Shadow bias (0.0001 - 0.01)
ShadowBias=0.001

; Shadow distance (10 - 200)
ShadowDistance=50.0

; Shadow cascades (1 - 4)
ShadowCascades=4

; Enable dynamic shadows
DynamicShadows=true

; Enable soft shadows (PCF)
SoftShadows=true

; Enable cascaded shadows (CSM)
CascadedShadows=true

; Shadow map resolution (512, 1024, 2048, 4096)
ShadowMapResolution=2048

; Ambient occlusion intensity
AmbientOcclusionIntensity=0.5

; Shadow quality
; 0 = Low, 1 = Medium, 2 = High, 3 = Ultra
ShadowQuality=2

; Shadow update time (milliseconds)
ShadowUpdateTime=16