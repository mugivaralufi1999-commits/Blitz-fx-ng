[WaterSystem]
; Water System Configuration

; Wave amplitude (0.0 - 2.0)
WaveAmplitude=0.5

; Wave frequency (0.1 - 1.0)
WaveFrequency=0.3

; Wave speed (0.5 - 5.0)
WaveSpeed=2.0

; Water height
WaterHeight=0.0

; Water color (R, G, B)
WaterColor_R=0.2
WaterColor_G=0.5
WaterColor_B=0.8

; Foam color (R, G, B)
FoamColor_R=0.9
FoamColor_G=0.95
FoamColor_B=1.0

; Water transparency (0.0 - 1.0)
WaterTransparency=0.7

; Reflection intensity (0.0 - 1.0)
ReflectionIntensity=0.3

; Refraction intensity (0.0 - 1.0)
RefractionIntensity=0.5

; Normal map quality
NormalQuality=2

; Enable foam animation
EnableFoamAnimation=true

; Foam animation speed
FoamAnimationSpeed=1.5