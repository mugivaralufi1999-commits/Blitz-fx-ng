<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1><i class="fas fa-cloud-sun"></i> Weather Dashboard</h1>
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search city or coordinates..."
                    autocomplete="off"
                >
                <button id="searchBtn" class="btn-search">
                    <i class="fas fa-search"></i>
                </button>
                <button id="geolocationBtn" class="btn-geo" title="Use my location">
                    <i class="fas fa-map-marker-alt"></i>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Loading State -->
            <div id="loadingSpinner" class="loading-spinner" style="display: none;">
                <div class="spinner"></div>
                <p>Fetching weather data...</p>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="error-message" style="display: none;"></div>

            <!-- Current Weather Section -->
            <section id="currentWeather" class="current-weather" style="display: none;">
                <div class="weather-main">
                    <div class="location-info">
                        <h2 id="cityName"></h2>
                        <p id="coordinates"></p>
                    </div>
                    <div class="temperature-section">
                        <div class="temp-display">
                            <span id="temperature" class="temperature"></span>
                            <span class="temp-unit">°C</span>
                        </div>
                        <div class="weather-condition">
                            <img id="weatherIcon" src="" alt="Weather icon">
                            <p id="description"></p>
                        </div>
                    </div>
                </div>

                <!-- Weather Details Grid -->
                <div class="weather-details">
                    <div class="detail-card">
                        <div class="detail-header">
                            <i class="fas fa-tint"></i>
                            <span>Humidity</span>
                        </div>
                        <div class="detail-value">
                            <p id="humidity">--</p>
                            <span class="unit">%</span>
                        </div>
                    </div>

                    <div class="detail-card">
                        <div class="detail-header">
                            <i class="fas fa-wind"></i>
                            <span>Wind Speed</span>
                        </div>
                        <div class="detail-value">
                            <p id="windSpeed">--</p>
                            <span class="unit">m/s</span>
                        </div>
                    </div>

                    <div class="detail-card">
                        <div class="detail-header">
                            <i class="fas fa-compress"></i>
                            <span>Pressure</span>
                        </div>
                        <div class="detail-value">
                            <p id="pressure">--</p>
                            <span class="unit">hPa</span>
                        </div>
                    </div>

                    <div class="detail-card">
                        <div class="detail-header">
                            <i class="fas fa-eye"></i>
                            <span>Visibility</span>
                        </div>
                        <div class="detail-value">
                            <p id="visibility">--</p>
                            <span class="unit">km</span>
                        </div>
                    </div>

                    <div class="detail-card">
                        <div class="detail-header">
                            <i class="fas fa-temperature-high"></i>
                            <span>Feels Like</span>
                        </div>
                        <div class="detail-value">
                            <p id="feelsLike">--</p>
                            <span class="unit">°C</span>
                        </div>
                    </div>

                    <div class="detail-card">
                        <div class="detail-header">
                            <i class="fas fa-cloud"></i>
                            <span>Cloudiness</span>
                        </div>
                        <div class="detail-value">
                            <p id="cloudiness">--</p>
                            <span class="unit">%</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Forecast Section -->
            <section id="forecastSection" class="forecast-section" style="display: none;">
                <h3>5-Day Forecast</h3>
                <div id="forecastContainer" class="forecast-container"></div>
            </section>

            <!-- Saved Cities Section -->
            <section id="savedCitiesSection" class="saved-cities-section">
                <h3>Saved Cities</h3>
                <div id="savedCitiesList" class="saved-cities-list"></div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Weather Dashboard | Data from <a href="https://openweathermap.org" target="_blank">OpenWeatherMap API</a></p>
            <p class="last-update">Last updated: <span id="lastUpdate">--:--:--</span></p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
